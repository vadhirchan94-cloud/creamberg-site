<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Creamberg</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffc0cb;
            background: linear-gradient(135deg, #ffc0cb 0%, #ffe4e1 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }


        .main-wrapper {
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            width: 100%;
        }

        .business-title {
            font-family: 'Luckiest Guy', cursive;
            font-size: clamp(40px, 8vw, 70px);
            background: linear-gradient(to bottom, #fc54a8, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px rgba(0, 0, 0, 0.1));
            margin-bottom: 5px;
            text-align: center;
        }

        .subtitle {
            font-family: 'Luckiest Guy', cursive;
            color: #6495ed; 
            font-size: 22px;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 1px;
        }


        .link-bar {
            display: flex; 
            gap: 15px;     
            width: 100%;
            max-width: 800px; 
            margin-bottom: 30px;
            flex-wrap: wrap; 
            justify-content: center;
        }

        .hyperlink-box {
            flex: 1; 
            min-width: 200px;
            text-align: center;
            padding: 20px;
            background-color: white; 
            border: 2px solid #fc54a8;
            border-radius: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            text-decoration: none;
            color: inherit;
        }

        .hyperlink-box:hover {
            transform: translateY(-5px);
            background-color: #fff0f5;
        }

        .icon { font-size: 35px; margin-bottom: 10px; }
        .link-text { font-weight: bold; font-size: 1.1em; color: #fc54a8; margin-bottom: 5px; }
        .sub-text { font-size: 0.85em; color: #666; }

        .profile-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%; 
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }


        .back-btn {
            text-decoration: none;
            background: #333;
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .back-btn:hover {
            background: #fc54a8;
            transform: scale(1.05);
        }

        footer {
            width: 100%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.3);
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
        }

        footer span { color: #fc54a8; font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <h1 class="business-title">Contact Us</h1>
        <p class="subtitle">GET IN TOUCH WITH THE SCOOP TEAM</p>

        <img src="vadhir.jpg.jpeg" class="profile-img" alt="Contact Person">

        <div class="link-bar">
            <a href="https://www.instagram.com/creamberg.bze/" target="_blank" class="hyperlink-box">
                <div class="icon">📸</div>
                <div class="link-text">Instagram</div>
                <div class="sub-text">@creamberg.bze</div>
            </a>

            <a href="mailto:creambergbelize@gmail.com" class="hyperlink-box">
                <div class="icon">📧</div>
                <div class="link-text">Email Us</div>
                <div class="sub-text">creambergbelize@gmail.com</div>
            </a>

            <a href="tel:+5016041689" class="hyperlink-box">
                <div class="icon">📱</div>
                <div class="link-text">Call Us</div>
                <div class="sub-text">+501 604-1689</div>
            </a>
        </div>

        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

    <footer>
        <p>&copy; 2026 Creamberg. All Rights Reserved.</p>
        <p>Designed by <span>Vadhir Chan, Gael Gomez, & Owen Innis</span></p>
    </footer>

</body>
</html>
